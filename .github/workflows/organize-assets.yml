name: Organize media assets

on:
  push:
    branches: [main]
    paths:
      - .github/workflows/organize-assets.yml
  workflow_dispatch:

permissions:
  contents: write

jobs:
  organize:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Move media files into assets folders
        run: |
          set -euo pipefail

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

          mkdir -p assets/images/brand assets/images/icons assets/images/social assets/images/reviews assets/images/gallery assets/images/hero assets/videos/archive

          move_file() {
            src="$1"
            dest="$2"
            if [ -f "$src" ]; then
              mkdir -p "$(dirname "$dest")"
              git mv "$src" "$dest"
            fi
          }

          move_file logo-header.png assets/images/brand/logo-header.png
          move_file logo.png assets/images/brand/logo.png
          move_file logo-original.png assets/images/brand/logo-original.png
          move_file room_jurmala_logo.svg assets/images/brand/room_jurmala_logo.svg

          move_file favicon.ico assets/images/icons/favicon.ico
          move_file favicon-512.png assets/images/icons/favicon-512.png
          move_file apple-touch-icon.png assets/images/icons/apple-touch-icon.png

          move_file og-image.jpg assets/images/social/og-image.jpg

          move_file review-cta-button.png assets/images/reviews/review-cta-button.png
          move_file review-cta-button-en.png assets/images/reviews/review-cta-button-en.png
          move_file review-cta-button-ru.png assets/images/reviews/review-cta-button-ru.png

          move_file hero-cat-cutout.png assets/images/hero/hero-cat-cutout.png

          move_file activity-room.jpeg assets/images/gallery/activity-room.jpeg
          move_file creative-table.jpeg assets/images/gallery/creative-table.jpeg
          move_file gallery-activity-setup.jpeg assets/images/gallery/gallery-activity-setup.jpeg
          move_file gallery-event-floor.png assets/images/gallery/gallery-event-floor.png
          move_file gallery-warm-corner.png assets/images/gallery/gallery-warm-corner.png
          move_file kitchen-dining.jpeg assets/images/gallery/kitchen-dining.jpeg
          move_file soft-play.jpeg assets/images/gallery/soft-play.jpeg
          move_file space-open.jpeg assets/images/gallery/space-open.jpeg
          move_file towels-balls.jpeg assets/images/gallery/towels-balls.jpeg
          move_file workshop-kids.jpeg assets/images/gallery/workshop-kids.jpeg

          move_file room-jurmala-bernu-nodarbiba.mp4 assets/videos/room-jurmala-bernu-nodarbiba.mp4
          move_file room-jurmala-privats-pasakums.mp4 assets/videos/room-jurmala-privats-pasakums.mp4
          move_file room-jurmala-radosa-darbnica-berniem.mp4 assets/videos/room-jurmala-radosa-darbnica-berniem.mp4
          move_file room-jurmala-telpas-ieeja.mp4 assets/videos/room-jurmala-telpas-ieeja.mp4
          move_file room-jurmala-vingrosanas-nodarbiba.mp4 assets/videos/room-jurmala-vingrosanas-nodarbiba.mp4

          move_file video-1.mp4 assets/videos/archive/video-1.mp4
          move_file video-2.mp4 assets/videos/archive/video-2.mp4
          move_file video-3.mp4 assets/videos/archive/video-3.mp4
          move_file video-4.mp4 assets/videos/archive/video-4.mp4
          move_file video-5.mp4 assets/videos/archive/video-5.mp4

          perl -pi -e 's#https://roomjurmala\.lv/og-image\.jpg#https://roomjurmala.lv/assets/images/social/og-image.jpg#g; s#https://roomjurmala\.lv/logo\.png#https://roomjurmala.lv/assets/images/brand/logo.png#g; s#href="/favicon\.ico#href="/assets/images/icons/favicon.ico#g; s#href="/favicon-512\.png#href="/assets/images/icons/favicon-512.png#g; s#href="/apple-touch-icon\.png#href="/assets/images/icons/apple-touch-icon.png#g' index.html

          perl -pi -e 's#(?<![/\w.-])logo-header\.png#assets/images/brand/logo-header.png#g; s#(?<![/\w.-])logo\.png#assets/images/brand/logo.png#g; s#(?<![/\w.-])room_jurmala_logo\.svg#assets/images/brand/room_jurmala_logo.svg#g; s#(?<![/\w.-])og-image\.jpg#assets/images/social/og-image.jpg#g; s#(?<![/\w.-])favicon\.ico#assets/images/icons/favicon.ico#g; s#(?<![/\w.-])favicon-512\.png#assets/images/icons/favicon-512.png#g; s#(?<![/\w.-])apple-touch-icon\.png#assets/images/icons/apple-touch-icon.png#g; s#(?<![/\w.-])review-cta-button\.png#assets/images/reviews/review-cta-button.png#g; s#(?<![/\w.-])review-cta-button-en\.png#assets/images/reviews/review-cta-button-en.png#g; s#(?<![/\w.-])review-cta-button-ru\.png#assets/images/reviews/review-cta-button-ru.png#g; s#(?<![/\w.-])hero-cat-cutout\.png#assets/images/hero/hero-cat-cutout.png#g; s#(?<![/\w.-])activity-room\.jpeg#assets/images/gallery/activity-room.jpeg#g; s#(?<![/\w.-])creative-table\.jpeg#assets/images/gallery/creative-table.jpeg#g; s#(?<![/\w.-])gallery-activity-setup\.jpeg#assets/images/gallery/gallery-activity-setup.jpeg#g; s#(?<![/\w.-])gallery-event-floor\.png#assets/images/gallery/gallery-event-floor.png#g; s#(?<![/\w.-])gallery-warm-corner\.png#assets/images/gallery/gallery-warm-corner.png#g; s#(?<![/\w.-])kitchen-dining\.jpeg#assets/images/gallery/kitchen-dining.jpeg#g; s#(?<![/\w.-])soft-play\.jpeg#assets/images/gallery/soft-play.jpeg#g; s#(?<![/\w.-])space-open\.jpeg#assets/images/gallery/space-open.jpeg#g; s#(?<![/\w.-])towels-balls\.jpeg#assets/images/gallery/towels-balls.jpeg#g; s#(?<![/\w.-])workshop-kids\.jpeg#assets/images/gallery/workshop-kids.jpeg#g; s#(?<![/\w.-])room-jurmala-bernu-nodarbiba\.mp4#assets/videos/room-jurmala-bernu-nodarbiba.mp4#g; s#(?<![/\w.-])room-jurmala-privats-pasakums\.mp4#assets/videos/room-jurmala-privats-pasakums.mp4#g; s#(?<![/\w.-])room-jurmala-radosa-darbnica-berniem\.mp4#assets/videos/room-jurmala-radosa-darbnica-berniem.mp4#g; s#(?<![/\w.-])room-jurmala-telpas-ieeja\.mp4#assets/videos/room-jurmala-telpas-ieeja.mp4#g; s#(?<![/\w.-])room-jurmala-vingrosanas-nodarbiba\.mp4#assets/videos/room-jurmala-vingrosanas-nodarbiba.mp4#g' index.html script.js styles.css sitemap.xml robots.txt

          cat > README.md <<'EOF'
          # ROOM Jurmala

          Static website for ROOM Jurmala, an event and activity space in Jurmala.

          ## Project Structure

          - `index.html` - page markup and SEO metadata
          - `styles.css` - site styling
          - `script.js` - language switching and interactive behavior
          - `assets/images/brand/` - logos and brand marks
          - `assets/images/icons/` - favicons and app icons
          - `assets/images/gallery/` - space and event photography
          - `assets/images/hero/` - decorative hero cutouts
          - `assets/images/reviews/` - localized review call-to-action images
          - `assets/images/social/` - social sharing preview images
          - `assets/videos/` - active site videos
          - `assets/videos/archive/` - legacy video exports kept for reference

          ## Deployment

          This is a plain static site. It can be served from any static host by publishing the repository root.
          EOF
          sed -i 's/^          //' README.md

          rm -f .github/workflows/organize-assets.yml

          git add -A
          if git diff --cached --quiet; then
            echo "No changes to commit."
          else
            git commit -m "Organize media assets"
            git push
          fi
