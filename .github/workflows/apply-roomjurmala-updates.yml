name: Apply Room Jurmala updates

on:
  push:
    branches: [main]
    paths:
      - .github/workflows/apply-roomjurmala-updates.yml
  workflow_dispatch:

permissions:
  contents: write

jobs:
  apply:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: main
          token: ${{ secrets.GITHUB_TOKEN }}
      - name: Apply patch and remove temporary workflow
        run: |
          set -euo pipefail
          cat > /tmp/roomjurmala-updates.patch.b64 <<'PATCH_B64'
          
          PATCH_B64
          sed -i 's/^          //' /tmp/roomjurmala-updates.patch.b64
          base64 -d /tmp/roomjurmala-updates.patch.b64 > /tmp/roomjurmala-updates.patch
          git apply --index /tmp/roomjurmala-updates.patch
          rm -f .github/workflows/apply-roomjurmala-updates.yml
          git add -A
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          if git diff --cached --quiet; then
            echo "No changes to commit"
          else
            git commit -m "Update contact and social sections"
            git push origin HEAD:main
          fi
