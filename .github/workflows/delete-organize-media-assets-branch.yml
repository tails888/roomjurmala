name: Delete organize-media-assets branch

on:
  push:
    branches: [main]
    paths:
      - .github/workflows/delete-organize-media-assets-branch.yml
  workflow_dispatch:

permissions:
  contents: write

jobs:
  cleanup:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Delete old branch and remove this workflow
        run: |
          set -euo pipefail

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

          git push origin --delete organize-media-assets || true

          rm -f .github/workflows/delete-organize-media-assets-branch.yml
          git add -A
          if git diff --cached --quiet; then
            echo "No workflow cleanup changes to commit."
          else
            git commit -m "Remove temporary branch cleanup workflow"
            git push
          fi
