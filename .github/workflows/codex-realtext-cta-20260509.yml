name: Apply review CTA update

on:
  push:
    branches: [main]
    paths:
      - .github/workflows/codex-realtext-cta-20260509.yml
  workflow_dispatch:

permissions:
  contents: write

jobs:
  apply:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: main
          token: ${{ secrets.GITHUB_TOKEN }}
      - name: Apply review CTA patch and remove temporary workflow
        shell: bash
        run: |
          set -euo pipefail
          cat > /tmp/cta-realtext.patch.b64 <<'PATCH64'
          
          PATCH64
          base64 -d /tmp/cta-realtext.patch.b64 > /tmp/cta-realtext.patch
          git apply /tmp/cta-realtext.patch
          rm -f .github/workflows/codex-realtext-cta-20260509.yml
          git add -A
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          if git diff --cached --quiet; then
            echo "No changes to commit"
          else
            git commit -m "Render review CTA with HTML text"
            git push origin HEAD:main
          fi
