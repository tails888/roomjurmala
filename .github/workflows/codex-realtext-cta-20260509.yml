name: Apply review CTA update

on:
  push:
    paths:
      - .github/workflows/codex-realtext-cta-20260509.yml

permissions:
  contents: write

jobs:
  apply:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          persist-credentials: true

      - name: Apply local CTA changes
        shell: bash
        run: |
          set -euo pipefail
          python3 <<'PY'
          from pathlib import Path

          def replace_once(text, old, new, label):
              if old in text:
                  return text.replace(old, new, 1)
              if new in text:
                  print(f"{label}: already applied")
                  return text
              raise SystemExit(f"Missing expected block for {label}")

          index = Path('index.html')
          html = index.read_text()
          html = html.replace('styles.css?v=20260508-whatsapp', 'styles.css?v=20260509-realtextcta')
          html = html.replace('script.js?v=20260508-whatsapp', 'script.js?v=20260509-realtextcta')
          old_cta_html = '''      <a href="https://g.page/r/CT3OJohvycNaEBM/review" target="_blank" rel="noopener" class="review-cta" aria-label="Pastāsti kā mums izdevās">
        <img src="assets/images/reviews/review-cta-button.png" alt="Pastāsti kā mums izdevās" width="1842" height="444" loading="lazy" />
      </a>'''
          new_cta_html = '''      <a href="https://g.page/r/CT3OJohvycNaEBM/review" target="_blank" rel="noopener" class="review-cta" aria-label="Pastāsti kā mums izdevās">
        <span class="review-cta-spark review-cta-spark-left" aria-hidden="true">✦</span>
        <span class="review-cta-spark review-cta-spark-top" aria-hidden="true">✦</span>
        <span class="review-cta-dot" aria-hidden="true"></span>
        <span class="review-cta-face" aria-hidden="true">
          <span class="review-cta-eye"></span>
          <span class="review-cta-eye"></span>
          <span class="review-cta-mouth"></span>
        </span>
        <span class="review-cta-text">Pastāsti kā mums izdevās</span>
      </a>'''
          html = replace_once(html, old_cta_html, new_cta_html, 'index review CTA markup')
          index.write_text(html)

          styles = Path('styles.css')
          css = styles.read_text()
          start = css.find('.review-cta {\n  display: inline-block;')
          if start != -1:
              end = css.find('\n\n/* ─── Gallery', start)
              if end == -1:
                  raise SystemExit('Missing gallery marker after review CTA CSS')
              new_cta_css = '''.review-cta {
  --cta-border: #44291a;
  --cta-text: #321f18;
  display: block;
  position: relative;
  width: min(760px, calc(100% - 28px));
  height: 178px;
  text-decoration: none;
  transition: transform 0.22s ease, filter 0.22s ease;
  color: var(--cta-text);
  filter: drop-shadow(0 16px 10px rgba(34, 19, 12, 0.24));
}
.review-cta::before {
  content: '';
  position: absolute;
  top: 34px;
  right: 0;
  bottom: 28px;
  left: 112px;
  border: 7px solid var(--cta-border);
  border-left-width: 0;
  border-radius: 0 58px 58px 0;
  background:
    radial-gradient(circle at 92% 20%, rgba(255, 216, 150, 0.34) 0 12%, transparent 18%),
    linear-gradient(180deg, #FFB76C 0%, #F58B22 54%, #DE721C 100%);
  box-shadow:
    inset 0 14px 0 rgba(255, 232, 190, 0.46),
    inset 0 -12px 0 rgba(151, 65, 14, 0.18);
}
.review-cta::after {
  content: '';
  position: absolute;
  right: 28px;
  top: 48px;
  width: 112px;
  height: 34px;
  border-radius: 999px;
  background: linear-gradient(90deg, transparent 0%, rgba(255, 238, 200, 0.42) 100%);
  opacity: 0.7;
  pointer-events: none;
}
.review-cta:hover {
  transform: translateY(-3px) rotate(-0.4deg);
  filter: brightness(1.04) saturate(1.03);
}
.review-cta-face {
  position: absolute;
  left: 18px;
  top: 28px;
  width: 156px;
  height: 136px;
  border: 7px solid var(--cta-border);
  border-radius: 50%;
  background:
    radial-gradient(circle at 34% 26%, rgba(255,255,255,0.76) 0 15%, transparent 30%),
    linear-gradient(145deg, #FFF6E6 0%, #FFE2B9 76%, #F8C07D 100%);
  box-shadow:
    inset 12px 12px 0 rgba(255, 255, 255, 0.26),
    10px 14px 0 rgba(89, 45, 14, 0.18);
  z-index: 3;
}
.review-cta-face::after {
  content: '';
  position: absolute;
  left: 16px;
  bottom: -25px;
  width: 54px;
  height: 52px;
  background: inherit;
  border-left: 7px solid var(--cta-border);
  border-bottom: 7px solid var(--cta-border);
  border-radius: 0 0 0 36px;
  transform: rotate(15deg);
}
.review-cta-eye {
  position: absolute;
  top: 56px;
  width: 30px;
  height: 18px;
  border-top: 7px solid var(--cta-border);
  border-radius: 28px 28px 0 0;
  z-index: 4;
}
.review-cta-eye:nth-child(1) { left: 44px; }
.review-cta-eye:nth-child(2) { right: 44px; }
.review-cta-mouth {
  position: absolute;
  left: 50%;
  top: 86px;
  width: 42px;
  height: 28px;
  transform: translateX(-50%);
  background: var(--cta-border);
  border-radius: 0 0 32px 32px;
  z-index: 4;
}
.review-cta-text {
  position: absolute;
  left: 218px;
  right: 34px;
  top: 50%;
  z-index: 2;
  transform: translateY(-50%);
  font-family: 'Playfair Display', Georgia, serif;
  font-size: clamp(2rem, 3.2vw, 2.62rem);
  font-weight: 700;
  line-height: 1.04;
  color: var(--cta-text);
  text-align: center;
  white-space: nowrap;
  text-shadow: 0 2px 0 rgba(255, 204, 126, 0.24);
}
html[lang="ru"] .review-cta-text {
  font-size: clamp(1.78rem, 2.7vw, 2.22rem);
}
.review-cta-spark,
.review-cta-dot {
  position: absolute;
  z-index: 4;
  color: #F09A48;
  text-shadow: 0 3px 0 rgba(83, 45, 22, 0.25);
  pointer-events: none;
}
.review-cta-spark-left {
  left: -8px;
  top: 54px;
  font-size: 2.3rem;
}
.review-cta-spark-top {
  left: 136px;
  top: 6px;
  font-size: 4rem;
}
.review-cta-dot {
  left: -8px;
  top: 104px;
  width: 16px;
  height: 16px;
  border-radius: 50%;
  background: #F8A857;
  border: 2px solid #7A3F1B;
}'''
              css = css[:start] + new_cta_css + css[end:]
          elif '--cta-border: #44291a;' not in css:
              raise SystemExit('Missing expected review CTA CSS block')

          old_mobile = '''  .review-cta {
    width: min(100%, 360px);
  }'''
          new_mobile = '''  .review-cta {
    width: min(100%, 360px);
    height: 108px;
  }
  .review-cta::before {
    top: 22px;
    right: 0;
    bottom: 16px;
    left: 68px;
    border-width: 4px;
    border-left-width: 0;
    border-radius: 0 36px 36px 0;
    box-shadow:
      inset 0 8px 0 rgba(255, 232, 190, 0.46),
      inset 0 -8px 0 rgba(151, 65, 14, 0.18);
  }
  .review-cta::after {
    right: 20px;
    top: 32px;
    width: 56px;
    height: 18px;
  }
  .review-cta-face {
    left: 10px;
    top: 18px;
    width: 86px;
    height: 76px;
    border-width: 4px;
    box-shadow:
      inset 7px 7px 0 rgba(255, 255, 255, 0.26),
      6px 8px 0 rgba(89, 45, 14, 0.18);
  }
  .review-cta-face::after {
    left: 9px;
    bottom: -14px;
    width: 30px;
    height: 30px;
    border-left-width: 4px;
    border-bottom-width: 4px;
    border-radius: 0 0 0 20px;
  }
  .review-cta-eye {
    top: 30px;
    width: 17px;
    height: 11px;
    border-top-width: 4px;
  }
  .review-cta-eye:nth-child(1) { left: 25px; }
  .review-cta-eye:nth-child(2) { right: 25px; }
  .review-cta-mouth {
    top: 48px;
    width: 24px;
    height: 16px;
    border-radius: 0 0 18px 18px;
  }
  .review-cta-text {
    left: 112px;
    right: 18px;
    font-size: clamp(1.36rem, 6.2vw, 1.58rem);
    white-space: normal;
  }
  html[lang="ru"] .review-cta-text {
    font-size: clamp(1.12rem, 5.2vw, 1.36rem);
  }
  .review-cta-spark-left {
    left: -5px;
    top: 34px;
    font-size: 1.35rem;
  }
  .review-cta-spark-top {
    left: 72px;
    top: 0;
    font-size: 2.3rem;
  }
  .review-cta-dot {
    left: -4px;
    top: 64px;
    width: 10px;
    height: 10px;
    border-width: 1px;
  }'''
          css = replace_once(css, old_mobile, new_mobile, 'mobile review CTA CSS')
          styles.write_text(css)

          script = Path('script.js')
          js = script.read_text()
          for old, new, label in [
              ("      cta: 'Pastāsti kā mums izdevās',\n      ctaImage: 'assets/images/reviews/review-cta-button.png'", "      cta: 'Pastāsti kā mums izdevās'", 'LV ctaImage removal'),
              ("      cta: 'Tell us how we did',\n      ctaImage: 'assets/images/reviews/review-cta-button-en.png'", "      cta: 'Tell us how we did'", 'EN ctaImage removal'),
              ("      cta: 'Расскажите как у нас получилось',\n      ctaImage: 'assets/images/reviews/review-cta-button-ru.png'", "      cta: 'Расскажите как у нас получилось'", 'RU ctaImage removal'),
          ]:
              js = replace_once(js, old, new, label)

          old_js_block = '''    const testimonialsCtaImage = testimonialsCta.querySelector('img');
    if (testimonialsCtaImage) {
      testimonialsCtaImage.alt = copy.testimonials.cta;
      if (copy.testimonials.ctaImage) testimonialsCtaImage.src = copy.testimonials.ctaImage;
    }'''
          new_js_block = '''    const testimonialsCtaText = testimonialsCta.querySelector('.review-cta-text');
    if (testimonialsCtaText) testimonialsCtaText.textContent = copy.testimonials.cta;'''
          js = replace_once(js, old_js_block, new_js_block, 'testimonial CTA language updater')
          script.write_text(js)
          PY

      - name: Commit update and remove workflow
        shell: bash
        run: |
          set -euo pipefail
          rm -f .github/workflows/codex-realtext-cta-20260509.yml
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add index.html styles.css script.js .github/workflows/codex-realtext-cta-20260509.yml
          if git diff --cached --quiet; then
            echo "No changes to commit"
            exit 0
          fi
          git commit -m "Render review CTA with HTML text"
          git push
